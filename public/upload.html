<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upload a photo to the BSCS 1A Memory Book archive.">
  <title>Upload — BSCS Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/assets/logo.png">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div style="display: flex; align-items: center;">
      <img src="/assets/logo.png" alt="BSCS" style="height: 30px; margin-right: 15px;">
      <span class="navbar-brand">BSCS 1A</span>
    </div>
    <ul class="navbar-links">
      <li><a href="/">Home</a></li>
      <li><a href="/moments.html">Gallery</a></li>
      <li><a href="/upload.html" class="active">Upload</a></li>
      <li><a href="/admin.html">Admin</a></li>
    </ul>
    <div id="sys-clock" style="font-family: 'Fira Code', monospace; font-size: 0.8rem; color: var(--accent);"></div>
  </nav>

  <!-- Terminal Upload Card -->
  <div class="terminal-card">
    <div class="terminal-header">> SECURE_UPLOAD_CHANNEL // AUTHORIZATION_REQUIRED</div>

    <form id="upload-form" enctype="multipart/form-data">
      <div class="form-group">
        <label for="upload-file">SELECT_FILE</label>
        <input class="form-control" type="file" id="upload-file" name="image"
               accept=".jpg,.jpeg,.png,.webp,.gif" required>
      </div>

      <div class="form-group">
        <input type="text" id="upload-alias" class="form-control" maxlength="10" placeholder="NICKNAME/ALIAS (Optional)">
      </div>

      <div class="form-group">
        <label for="upload-title">TITLE_IDENTIFIER</label>
        <input class="form-control" type="text" id="upload-title" name="title"
               placeholder="Enter title..." maxlength="25" pattern="[a-zA-Z0-9_ ]+" required>
        <span id="title-counter" class="sys-counter">> SYSTEM_MEM: [0/25 BYTES]</span>
      </div>

      <div class="form-group">
        <label for="upload-date">ARCHIVE_DATE</label>
        <input class="form-control" type="date" id="upload-date" name="date" required>
      </div>

      <div class="form-group">
        <label for="upload-desc">DESCRIPTION</label>
        <textarea class="form-control" id="upload-desc" name="description"
                  placeholder="Context: who, what, when..." rows="3" maxlength="200" required></textarea>
        <span id="desc-counter" class="sys-counter">> LOG_CAPACITY: [0/200 BYTES]</span>
      </div>

      <button class="btn-terminal" type="submit" id="upload-btn">TRANSMIT_FILE</button>
    </form>

    <div class="form-status" id="upload-status"></div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
